<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Balance · Connection</title><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');:root{--bg:#08111c;--line:rgba(185,223,255,.18);--text:#eef6ff;--muted:#d3deec;--accent:#7ad1d8;--accent2:#7ad1d8;--purple:#a78bfa;--shadow:0 26px 70px rgba(0,0,0,.42)}*{box-sizing:border-box}html,body{margin:0;min-height:100%}body{font-family:Inter,sans-serif;color:var(--text);min-height:100vh;background:radial-gradient(circle at top, rgba(122,209,216,.10), transparent 28%),linear-gradient(180deg,#07101b 0%,#0a1523 100%);display:grid;place-items:center;padding:48px;overflow:hidden}.wrap{width:min(960px,100%);border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg, rgba(11,18,30,.84), rgba(8,14,24,.74));box-shadow:var(--shadow);padding:38px 40px 40px}.eyebrow{margin:0 0 10px;color:#b8cde8;font-size:.8rem;text-transform:uppercase;letter-spacing:.18em;font-weight:600}h1{margin:0 0 14px;font-size:clamp(2.5rem,5vw,4rem)}.mode-chip{display:inline-block;margin:0 0 22px;padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:var(--accent);font-size:.8rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase}.lens-row{display:flex;gap:12px;flex-wrap:wrap;margin:0 0 26px}.lens-btn{border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:10px 14px;background:rgba(255,255,255,.04);color:#eef6ff;font:inherit;font-weight:600;cursor:pointer;transition:transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease}.lens-btn:hover{transform:translateY(-2px)}.lens-btn.active{color:#0b0f15}.lens-btn[data-lens="baseline"].active{background:rgba(255,255,255,.92);border-color:rgba(255,255,255,.92)}.lens-btn[data-lens="stoicism"].active{background:var(--accent);border-color:var(--accent)}.lens-btn[data-lens="zen"].active{background:var(--accent2);border-color:var(--accent2)}.lens-btn[data-lens="existentialism"].active{background:var(--purple);border-color:var(--purple)}p{margin:0 0 16px;color:var(--muted);line-height:1.84;font-size:1.06rem}.nav-pill{position:fixed;left:24px;top:24px;width:72px;height:148px;border-radius:999px;border:1px solid rgba(185,223,255,.28);background:linear-gradient(180deg, rgba(10,18,30,.88), rgba(7,14,24,.78));backdrop-filter:blur(10px);box-shadow:0 18px 42px rgba(0,0,0,.35);display:flex;flex-direction:column;overflow:hidden;z-index:9999;touch-action:none;user-select:none;cursor:grab}.nav-pill.dragging{cursor:grabbing}.nav-half{flex:1;border:0;background:transparent;color:#eaf5ff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font:inherit;cursor:pointer;padding:0 6px}.nav-half + .nav-half{border-top:1px solid rgba(185,223,255,.14)}.nav-half .icon{font-size:1.15rem}.nav-half .label{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-align:center;line-height:1.2}</style></head><body><main class="wrap"><p class="eyebrow">Balance Category</p><h1>Connection</h1><div class="mode-chip" id="modeChip">Baseline Definition</div><div class="lens-row"><button class="lens-btn active" data-lens="baseline">Baseline</button><button class="lens-btn" data-lens="stoicism">Stoicism</button><button class="lens-btn" data-lens="zen">Zen Buddhism</button><button class="lens-btn" data-lens="existentialism">Existentialism</button></div><div id="copy"></div></main><div class="nav-pill" id="navPill"><button class="nav-half" id="navHome" type="button"><span class="icon">⌂</span><span class="label">Menu</span></button><button class="nav-half" id="navBack" type="button"><span class="icon">←</span><span class="label">Back</span></button></div><script>const content={baseline:['The Connection domain represents relationships with others. It concerns the quality, vitality, and presence of social bonds across the different forms human connection can take.', 'Its subdimensions include romantic relationships, family bonds, friendships, and community involvement. These are different expressions of belonging, support, intimacy, and shared life.', 'Connection matters because humans thrive through connection and shared experience. A life can be productive and still become diminished if it is relationally thin.'],stoicism:['Through a Stoic lens, Connection is the lived expression of your nature as a social being. Your baseline rightly emphasizes relationships, belonging, and intimacy, and Stoicism would add that these are not secondary comforts but part of what it means to live in accordance with human nature. We are not made to exist as sealed-off individuals.', 'Family, romance, friendship, and community would be interpreted as contexts in which justice, patience, honesty, and goodwill are practiced. Stoicism does not sentimentalize relationship, but it takes it seriously as a sphere of moral action. Connection is where character becomes visible in how you treat real people, not just in abstract ideals.', 'In this lens, Connection means relational life guided by virtue. The key question is whether your bonds are being maintained with steadiness, sincerity, and a sense of shared humanity rather than by convenience, pride, or emotional volatility.'],zen:['Through a Zen Buddhist lens, Connection is inseparable from interdependence. Your baseline names the richness of bonds across romance, family, friendship, and community, and Zen would interpret those not as optional add-ons but as expressions of the fact that the self is never isolated from conditions, relationships, and mutual influence.', 'Zen would read Connection through presence, listening, and compassion. It asks whether you are truly meeting others as they are, or whether you are mostly relating to projections, roles, and habitual reactivity. The depth of connection depends on awareness as much as on intention.', 'In this mode, Connection becomes a practice of softening separation. It is less about ownership and more about mutual presence, care, and the ability to inhabit relationship without so much grasping, defensiveness, or self-centeredness.'],existentialism:['Through an Existentialist lens, Connection is the place where your freedom encounters the freedom of others. Your baseline emphasizes bonds and belonging, and existentialism would sharpen that by asking whether those bonds are authentic — whether you are actually present in relationship as a choosing self, or hiding inside scripts, roles, and expectations.', 'Romance, friendship, family, and community become arenas where honesty matters intensely. This lens is alert to how easily people use relationship either to escape themselves or to avoid genuine reciprocity. Real connection requires showing up as a person willing to be known, to choose, and to let others be fully real as well.', 'In this mode, Connection means relationship without bad faith. It is the courage to be truly present with others rather than merely socially adjacent to them.']};const labels={baseline:'Baseline Definition',stoicism:'Stoic Lens',zen:'Zen Buddhist Lens',existentialism:'Existentialist Lens'};const copy=document.getElementById('copy');const chip=document.getElementById('modeChip');const buttons=[...document.querySelectorAll('.lens-btn')];function render(lens){copy.innerHTML=content[lens].map(p=>`<p>${p}</p>`).join('');chip.textContent=labels[lens];buttons.forEach(btn=>btn.classList.toggle('active',btn.dataset.lens===lens));}buttons.forEach(btn=>btn.addEventListener('click',()=>render(btn.dataset.lens)));render('baseline');(function(){const pill=document.getElementById('navPill');const home=document.getElementById('navHome');const back=document.getElementById('navBack');if(!pill||!home||!back)return;const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));const key='balanceNavPillPos';const place=()=>{try{const raw=localStorage.getItem(key);if(!raw)return;const pos=JSON.parse(raw);const maxLeft=window.innerWidth-pill.offsetWidth-10;const maxTop=window.innerHeight-pill.offsetHeight-10;pill.style.left=clamp(pos.left ?? 24,10,maxLeft)+'px';pill.style.top=clamp(pos.top ?? 24,10,maxTop)+'px';}catch(_){}};const save=()=>{try{localStorage.setItem(key, JSON.stringify({left:pill.offsetLeft, top:pill.offsetTop}));}catch(_){}};let drag=null,moved=false;const onPointerDown=(e)=>{drag={id:e.pointerId,startX:e.clientX,startY:e.clientY,left:pill.offsetLeft,top:pill.offsetTop,target:e.target.closest('button')};moved=false;pill.classList.add('dragging');pill.setPointerCapture(e.pointerId);e.preventDefault();};const onPointerMove=(e)=>{if(!drag||e.pointerId!==drag.id)return;const dx=e.clientX-drag.startX,dy=e.clientY-drag.startY;if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;const maxLeft=window.innerWidth-pill.offsetWidth-10;const maxTop=window.innerHeight-pill.offsetHeight-10;pill.style.left=clamp(drag.left+dx,10,maxLeft)+'px';pill.style.top=clamp(drag.top+dy,10,maxTop)+'px';};const onPointerUp=(e)=>{if(!drag||e.pointerId!==drag.id)return;pill.classList.remove('dragging');try{pill.releasePointerCapture(e.pointerId);}catch(_){}const target=drag.target;const wasMoved=moved;drag=null;save();if(!wasMoved&&target){if(target===home)window.location.href='../menu.html';else if(target===back){if(window.history.length>1)window.history.back();else window.location.href='../menu.html';}}};pill.addEventListener('pointerdown',onPointerDown);pill.addEventListener('pointermove',onPointerMove);pill.addEventListener('pointerup',onPointerUp);pill.addEventListener('pointercancel',()=>{pill.classList.remove('dragging');drag=null;save();});window.addEventListener('resize',place);place();})();</script></body></html>
