<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Balance · Body</title><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');:root{--bg:#08111c;--line:rgba(185,223,255,.18);--text:#eef6ff;--muted:#d3deec;--accent:#f0a35d;--accent2:#7ad1d8;--purple:#a78bfa;--faith:#7bc47f;--shadow:0 26px 70px rgba(0,0,0,.42)}*{box-sizing:border-box}html,body{margin:0;min-height:100%}body{font-family:Inter,sans-serif;color:var(--text);min-height:100vh;background:radial-gradient(circle at top, rgba(122,209,216,.10), transparent 28%),linear-gradient(180deg,#07101b 0%,#0a1523 100%);display:grid;place-items:center;padding:clamp(14px,2.4vh,28px);overflow:hidden}.wrap{width:min(960px,100%);max-height:calc(100vh - clamp(28px,4.8vh,56px));border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg, rgba(11,18,30,.84), rgba(8,14,24,.74));box-shadow:var(--shadow);padding:clamp(20px,2.6vh,38px) clamp(20px,2.8vw,40px);display:flex;flex-direction:column;justify-content:flex-start;overflow:hidden}.eyebrow{margin:0 0 8px;color:#b8cde8;font-size:clamp(.68rem,1.15vh,.8rem);text-transform:uppercase;letter-spacing:.18em;font-weight:600}h1{margin:0 0 10px;font-size:clamp(2rem,4.6vh,3.5rem);line-height:1.05}.mode-chip{display:inline-block;align-self:flex-start;margin:0 0 16px;padding:7px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:var(--accent);font-size:clamp(.68rem,1.08vh,.8rem);font-weight:600;letter-spacing:.12em;text-transform:uppercase}.lens-row{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 18px}.lens-btn{border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.04);color:#eef6ff;font:inherit;font-size:clamp(.84rem,1.45vh,.95rem);font-weight:600;cursor:pointer;transition:transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease}.lens-btn:hover{transform:translateY(-2px)}.lens-btn.active{color:#0b0f15}.lens-btn[data-lens="baseline"].active{background:rgba(255,255,255,.92);border-color:rgba(255,255,255,.92)}.lens-btn[data-lens="stoicism"].active{background:var(--accent);border-color:var(--accent)}.lens-btn[data-lens="zen"].active{background:var(--accent2);border-color:var(--accent2)}.lens-btn[data-lens="existentialism"].active{background:var(--purple);border-color:var(--purple)}.lens-btn[data-lens="christianity"].active{background:var(--faith);border-color:var(--faith)}#copy{display:flex;flex-direction:column;gap:12px;min-height:0;flex:1;justify-content:space-evenly}p{margin:0;color:var(--muted);line-height:1.55;font-size:clamp(.92rem,1.62vh,1.01rem)}.nav-pill{position:fixed;left:24px;top:24px;width:72px;height:148px;border-radius:999px;border:1px solid rgba(185,223,255,.28);background:linear-gradient(180deg, rgba(10,18,30,.88), rgba(7,14,24,.78));backdrop-filter:blur(10px);box-shadow:0 18px 42px rgba(0,0,0,.35);display:flex;flex-direction:column;overflow:hidden;z-index:9999;touch-action:none;user-select:none;cursor:grab}.nav-pill.dragging{cursor:grabbing}.nav-half{flex:1;border:0;background:transparent;color:#eaf5ff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font:inherit;cursor:pointer;padding:0 6px}.nav-half + .nav-half{border-top:1px solid rgba(185,223,255,.14)}.nav-half .icon{font-size:1.15rem}.nav-half .label{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-align:center;line-height:1.2}</style></head><body><main class="wrap"><p class="eyebrow">Balance Category</p><h1>Body</h1><div class="mode-chip" id="modeChip">Baseline Definition</div><div class="lens-row"><button class="lens-btn active" data-lens="baseline">Baseline</button><button class="lens-btn" data-lens="stoicism">Stoicism</button><button class="lens-btn" data-lens="zen">Zen Buddhism</button><button class="lens-btn" data-lens="existentialism">Existentialism</button><button class="lens-btn" data-lens="christianity">Christianity</button></div><div id="copy"></div></main><div class="nav-pill" id="navPill"><button class="nav-half" id="navHome" type="button"><span class="icon">⌂</span><span class="label">Menu</span></button><button class="nav-half" id="navBack" type="button"><span class="icon">←</span><span class="label">Back</span></button></div><script>const content={baseline:['The Body domain represents maintaining and strengthening the physical organism. It is the layer of life concerned with health, energy, physical wellbeing, and the concrete biological condition that supports everything else. In practical terms, this includes the day-to-day reality of how your body feels, functions, recovers, and carries you through life.', 'Within this domain, the subdimensions include exercise and training, nutrition, sleep quality, medical care and doctor visits, and recovery and stress management. These are not isolated habits but interconnected expressions of how well the body is being supported over time.', 'Body matters because physical wellbeing is the biological foundation for every other domain. If the body is neglected, every other category is forced to compensate. If it is supported, the rest of life has a stronger base from which to operate.'],stoicism:['Through a Stoic lens, Body becomes the practice of stewardship rather than obsession. Your baseline definition already treats the body as foundational, and Stoicism would agree — but it would add that the purpose of physical care is not vanity or perfect control. The purpose is to maintain the instrument through which reason, discipline, and character can operate in the world.', 'Exercise, nutrition, sleep, medical care, and recovery would all be interpreted as disciplines of responsibility. A Stoic reading would ask: are you treating the body in a way that strengthens resilience, steadiness, and readiness for reality? It would not make bodily excellence the highest good, but it would treat negligence as a form of disorder because it weakens your ability to act well.', 'Stoicism would also remind you that the body is never fully yours to command. Illness, aging, injury, and fatigue remain partly outside your control. So the mature stance is neither indulgence nor domination, but dignified stewardship. In this lens, Body means caring for the physical organism enough that it supports a life of virtue, service, and composure under changing conditions.'],zen:['Through a Zen Buddhist lens, Body becomes the most immediate doorway into reality. Your baseline emphasizes the body as the biological foundation of life, and Zen would deepen that by saying the body is not just a support system — it is where life is actually happening now, in breath, posture, sensation, hunger, fatigue, movement, and stillness.', 'Exercise, sleep, nutrition, recovery, and medical care would be reframed less as optimization targets and more as practices of attention and non-separation. Instead of asking only whether the body is performing well, Zen asks whether you are inhabiting it clearly. Are you present to the actual state of your organism, or mainly living in abstractions while the body quietly accumulates tension and neglect?', 'In this lens, Body becomes a practice of compassionate awareness. Recovery matters because rest is real. Nutrition matters because the organism is not separate from the conditions it receives. Training matters because discipline can be a form of presence. Zen interpretation would make Body less about control and more about learning to live inside embodiment with steadiness, simplicity, and care.'],existentialism:['Through an Existentialist lens, Body becomes the concrete fact of your existence — the given condition through which your freedom must operate. Your baseline definition emphasizes the body as foundational, and existentialism would sharpen that by reminding you that every project, every ambition, and every ideal is filtered through limitation, vulnerability, mortality, and physical facticity.', 'Exercise, sleep, health, recovery, and stress management would be interpreted not as lifestyle accessories but as ways of responding to the real conditions of being alive. This lens asks whether you are living honestly in relation to your embodiment, or whether you are trying to imagine yourself as somehow above it. The body is where exhaustion, fragility, desire, and finitude become undeniable.', 'Existentially, Body is the place where life stops being theoretical. It confronts you with the truth that you are a finite being with a particular organism, not a floating intelligence outside time. So the question becomes: are you taking responsibility for the body that makes your life possible? In this mode, Body means inhabiting embodiment honestly enough that your freedom remains grounded in reality rather than fantasy.'],christianity:['Through a Christian lens, Body is not merely a performance machine but part of a life entrusted to your care. Your baseline already frames the body as the biological foundation of life, and Christianity would deepen that with the idea of stewardship: the body is something to honor, care for, and use in ways aligned with love, discipline, and service rather than vanity, neglect, or self-contempt.','Exercise, sleep, nutrition, recovery, and medical care would therefore be interpreted as forms of responsible care for a creaturely life. This lens would not ask for bodily perfection as a source of worth, but it would treat carelessness toward the body as a failure to value what has been given. The body matters because it is the vessel through which compassion, work, presence, and faithfulness become real in the world.','In this mode, Body becomes a practice of grateful stewardship. Strength can serve service. Rest can honor limitation. Care can become an expression of humility rather than obsession. The question is not simply whether the body performs, but whether you are treating it as something worthy of reverence, honesty, and care.']};const labels={baseline:'Baseline Definition',stoicism:'Stoic Lens',zen:'Zen Buddhist Lens',existentialism:'Existentialist Lens',christianity:'Christian Lens'};const copy=document.getElementById('copy');const chip=document.getElementById('modeChip');const buttons=[...document.querySelectorAll('.lens-btn')];function render(lens){copy.innerHTML=content[lens].map(p=>`<p>${p}</p>`).join('');chip.textContent=labels[lens];buttons.forEach(btn=>btn.classList.toggle('active',btn.dataset.lens===lens));}buttons.forEach(btn=>btn.addEventListener('click',()=>render(btn.dataset.lens)));render('baseline');(function(){const pill=document.getElementById('navPill');const home=document.getElementById('navHome');const back=document.getElementById('navBack');if(!pill||!home||!back)return;const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));const key='balanceNavPillPos';const place=()=>{try{const raw=localStorage.getItem(key);if(!raw)return;const pos=JSON.parse(raw);const maxLeft=window.innerWidth-pill.offsetWidth-10;const maxTop=window.innerHeight-pill.offsetHeight-10;pill.style.left=clamp(pos.left ?? 24,10,maxLeft)+'px';pill.style.top=clamp(pos.top ?? 24,10,maxTop)+'px';}catch(_){}};const save=()=>{try{localStorage.setItem(key, JSON.stringify({left:pill.offsetLeft, top:pill.offsetTop}));}catch(_){}};let drag=null,moved=false;const onPointerDown=(e)=>{drag={id:e.pointerId,startX:e.clientX,startY:e.clientY,left:pill.offsetLeft,top:pill.offsetTop,target:e.target.closest('button')};moved=false;pill.classList.add('dragging');pill.setPointerCapture(e.pointerId);e.preventDefault();};const onPointerMove=(e)=>{if(!drag||e.pointerId!==drag.id)return;const dx=e.clientX-drag.startX,dy=e.clientY-drag.startY;if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;const maxLeft=window.innerWidth-pill.offsetWidth-10;const maxTop=window.innerHeight-pill.offsetHeight-10;pill.style.left=clamp(drag.left+dx,10,maxLeft)+'px';pill.style.top=clamp(drag.top+dy,10,maxTop)+'px';};const onPointerUp=(e)=>{if(!drag||e.pointerId!==drag.id)return;pill.classList.remove('dragging');try{pill.releasePointerCapture(e.pointerId);}catch(_){}const target=drag.target;const wasMoved=moved;drag=null;save();if(!wasMoved&&target){if(target===home)window.location.href='../menu.html';else if(target===back){if(window.history.length>1)window.history.back();else window.location.href='../menu.html';}}};pill.addEventListener('pointerdown',onPointerDown);pill.addEventListener('pointermove',onPointerMove);pill.addEventListener('pointerup',onPointerUp);pill.addEventListener('pointercancel',()=>{pill.classList.remove('dragging');drag=null;save();});window.addEventListener('resize',place);place();})();</script></body></html>
