<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Balance · Wealth</title><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');:root{--bg:#08111c;--line:rgba(185,223,255,.18);--text:#eef6ff;--muted:#d3deec;--accent:#7ad1d8;--accent2:#7ad1d8;--purple:#a78bfa;--faith:#7bc47f;--shadow:0 26px 70px rgba(0,0,0,.42)}*{box-sizing:border-box}html,body{margin:0;min-height:100%}body{font-family:Inter,sans-serif;color:var(--text);min-height:100vh;background:radial-gradient(circle at top, rgba(122,209,216,.10), transparent 28%),linear-gradient(180deg,#07101b 0%,#0a1523 100%);display:grid;place-items:center;padding:clamp(14px,2.4vh,28px);overflow-x:hidden;overflow-y:auto}.wrap{width:min(960px,100%);max-height:calc(100vh - clamp(28px,4.8vh,56px));border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg, rgba(11,18,30,.84), rgba(8,14,24,.74));box-shadow:var(--shadow);padding:clamp(20px,2.6vh,38px) clamp(20px,2.8vw,40px);display:flex;flex-direction:column;justify-content:flex-start;overflow:hidden}.eyebrow{margin:0 0 8px;color:#b8cde8;font-size:clamp(.68rem,1.15vh,.8rem);text-transform:uppercase;letter-spacing:.18em;font-weight:600}h1{margin:0 0 10px;font-size:clamp(2rem,4.6vh,3.5rem);line-height:1.05}.mode-chip{display:inline-block;align-self:flex-start;margin:0 0 16px;padding:7px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:var(--accent);font-size:clamp(.68rem,1.08vh,.8rem);font-weight:600;letter-spacing:.12em;text-transform:uppercase}.lens-row{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 18px}.lens-btn{border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.04);color:#eef6ff;font:inherit;font-size:clamp(.84rem,1.45vh,.95rem);font-weight:600;cursor:pointer;transition:transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease}.lens-btn:hover{transform:translateY(-2px)}.lens-btn.active{color:#0b0f15}.lens-btn[data-lens="baseline"].active{background:rgba(255,255,255,.92);border-color:rgba(255,255,255,.92)}.lens-btn[data-lens="stoicism"].active{background:var(--accent);border-color:var(--accent)}.lens-btn[data-lens="zen"].active{background:var(--accent2);border-color:var(--accent2)}.lens-btn[data-lens="existentialism"].active{background:var(--purple);border-color:var(--purple)}.lens-btn[data-lens="christianity"].active{background:var(--faith);border-color:var(--faith)}#copy{display:flex;flex-direction:column;gap:12px;min-height:0;flex:1;justify-content:space-evenly}p{margin:0;color:var(--muted);line-height:1.55;font-size:clamp(.92rem,1.62vh,1.01rem)}.nav-pill{position:fixed;left:24px;top:24px;width:72px;height:148px;border-radius:999px;border:1px solid rgba(185,223,255,.28);background:linear-gradient(180deg, rgba(10,18,30,.88), rgba(7,14,24,.78));backdrop-filter:blur(10px);box-shadow:0 18px 42px rgba(0,0,0,.35);display:flex;flex-direction:column;overflow:hidden;z-index:9999;touch-action:none;user-select:none;cursor:grab}.nav-pill.dragging{cursor:grabbing}.nav-half{flex:1;border:0;background:transparent;color:#eaf5ff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font:inherit;cursor:pointer;padding:0 6px}.nav-half + .nav-half{border-top:1px solid rgba(185,223,255,.14)}.nav-half .icon{font-size:1.15rem}.nav-half .label{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-align:center;line-height:1.2}.visual{position:relative;margin:0 0 18px;border:1px solid rgba(255,255,255,.12);border-radius:24px;overflow:hidden;min-height:220px;background:radial-gradient(circle at 30% 32%, color-mix(in srgb, var(--accent) 38%, transparent), transparent 32%),radial-gradient(circle at 72% 60%, color-mix(in srgb, var(--accent2) 32%, transparent), transparent 34%),linear-gradient(160deg, rgba(11,18,30,.92), rgba(8,14,24,.88));box-shadow:0 18px 44px rgba(0,0,0,.24)}.visual::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 18%, rgba(255,255,255,.06), transparent 24%),linear-gradient(135deg, rgba(255,255,255,.02), transparent 44%, rgba(255,255,255,.03) 78%, transparent 100%)}.visual::after{content:"";position:absolute;inset:20px;border:1px solid rgba(255,255,255,.08);border-radius:18px}.visual-label{position:absolute;left:22px;bottom:18px;font-size:clamp(1.45rem,5vw,2.2rem);letter-spacing:.18em;text-transform:uppercase;color:rgba(238,246,255,.92);font-weight:600}.visual-mark{position:absolute;right:14px;bottom:-6px;font-size:clamp(5rem,24vw,8rem);line-height:1;color:rgba(255,255,255,.05);font-family:Georgia,serif}.visual-orb{position:absolute;left:50%;top:50%;width:44%;height:44%;transform:translate(-50%,-50%);background:radial-gradient(circle, color-mix(in srgb, var(--accent) 22%, transparent), transparent 66%);filter:blur(6px);opacity:.95}@media (max-width:720px){body{display:block;padding:12px}.wrap{width:100%;max-height:none;min-height:calc(100vh - 24px);border-radius:24px;padding:18px 16px 20px;overflow:visible}h1{font-size:clamp(1.8rem,9vw,2.6rem)}.mode-chip{margin:0 0 12px}.lens-row{gap:8px;margin:0 0 14px}.lens-btn{padding:8px 10px;font-size:.85rem}.lens-btn:hover{transform:none}#copy{gap:10px;justify-content:flex-start}.nav-pill{left:18px;top:18px}}</style></head><body><main class="wrap"><p class="eyebrow">Balance Category</p><h1>Wealth</h1><div class="mode-chip" id="modeChip">Baseline Definition</div><div class="visual" aria-hidden="true"><div class="visual-orb"></div><div class="visual-label" id="visualLabel"></div><div class="visual-mark" id="visualMark"></div></div><div class="lens-row"><button class="lens-btn active" data-lens="baseline">Baseline</button><button class="lens-btn" data-lens="stoicism">Stoicism</button><button class="lens-btn" data-lens="zen">Zen Buddhism</button><button class="lens-btn" data-lens="existentialism">Existentialism</button><button class="lens-btn" data-lens="christianity">Christianity</button></div><div id="copy"></div></main><div class="nav-pill" id="navPill"><button class="nav-half" id="navHome" type="button"><span class="icon">⌂</span><span class="label">Menu</span></button><button class="nav-half" id="navBack" type="button"><span class="icon">←</span><span class="label">Back</span></button></div><script>const visualLabel=document.getElementById('visualLabel');const visualMark=document.getElementById('visualMark');const domainThemes={Mind:{accent:'#7ad1d8',accent2:'#83aef7',mark:'M'},Body:{accent:'#f0a35d',accent2:'#d76a45',mark:'B'},Impact:{accent:'#ff8c69',accent2:'#f3c27d',mark:'I'},Connection:{accent:'#7ad1d8',accent2:'#9e8cff',mark:'C'},Spirit:{accent:'#e1bf84',accent2:'#7ad1d8',mark:'S'},Home:{accent:'#e1bf84',accent2:'#7bc47f',mark:'H'},Novelty:{accent:'#9e8cff',accent2:'#7ad1d8',mark:'N'},Play:{accent:'#f08ccb',accent2:'#e1bf84',mark:'P'},Wealth:{accent:'#7bc47f',accent2:'#e1bf84',mark:'W'}};const title=document.querySelector('h1')?.textContent?.trim();if(title&&domainThemes[title]){const t=domainThemes[title];document.documentElement.style.setProperty('--accent',t.accent);document.documentElement.style.setProperty('--accent2',t.accent2);if(visualLabel)visualLabel.textContent=title;if(visualMark)visualMark.textContent=t.mark;}const content={baseline:['The Wealth domain represents financial resources and economic stability. It concerns the material conditions that create security, optionality, and the capacity to support both present life and future possibility.', 'Its subdimensions include income generation, savings and investments, entrepreneurship, and career development. Wealth therefore includes both current stability and the systems that produce long-term support.', 'Wealth matters because financial resources enable freedom and long-term security. Material reality shapes what kinds of choices are actually available.'],stoicism:['Through a Stoic lens, Wealth is useful but not ultimate. Your baseline definition emphasizes security, optionality, and the material conditions of freedom, and Stoicism would agree that these are real goods — but it would insist that they remain subordinate to character. Wealth is a tool, not the measure of a life’s worth.', 'Income, savings, entrepreneurship, and career development would be interpreted as means of supporting a stable and responsible existence. The Stoic concern is not whether you possess resources, but whether you possess them without becoming possessed by them.', 'In this mode, Wealth becomes disciplined sufficiency. It is valuable insofar as it creates steadiness, generosity, and freedom from needless fragility, while remaining governed by wisdom rather than greed.'],zen:['Through a Zen Buddhist lens, Wealth is approached through simplicity and non-attachment. Your baseline definition rightly names security and optionality, and Zen would not deny their practical importance. But it would also ask whether the pursuit of financial support has become tangled with grasping, anxiety, and self-definition.', 'Savings, income, entrepreneurship, and career are interpreted as practical supports for life, not as final sources of identity or peace. The key question becomes whether material support is being held wisely, or whether it is constantly being converted into craving and fear.', 'In this mode, Wealth becomes enoughness practiced with awareness. It is the art of using resources well without confusing them for ultimate refuge.'],existentialism:['Through an Existentialist lens, Wealth is part of the concrete field in which freedom is exercised. Your baseline definition emphasizes optionality and future possibility, and existentialism would treat that as important because material conditions shape what actions are genuinely available.', 'Income, savings, career development, and entrepreneurship become expressions of how you are constructing the conditions of your life. This lens would ask whether your financial life reflects chosen values and serious responsibility, or whether it remains dictated by borrowed scripts, fear, or passivity.', 'In this mode, Wealth becomes material agency. It is not meaning itself, but it affects your ability to enact meaning in the world. The existential question is whether your economic life is being authored, or merely endured.'],christianity:['Through a Christian lens, Wealth is interpreted through stewardship, sufficiency, generosity, and freedom from domination by money. Your baseline already frames this domain around financial life and material stability, and Christianity would affirm the importance of provision while warning against allowing security, status, or greed to become the governing center of the self.','Income, savings, spending, debt, giving, and long-term financial planning would all be seen as moral as well as practical concerns. This lens asks whether money is serving life, responsibility, and care, or whether it is quietly becoming an idol. Wealth is not condemned simply for existing, but it is placed under the questions of integrity, gratitude, and generosity.','In this mode, Wealth becomes less about accumulation for its own sake and more about faithful management of resources. The aim is enoughness, stability, responsibility, and the ability to participate in care for oneself and others without becoming possessed by the pursuit of more.']};const labels={baseline:'Baseline Definition',stoicism:'Stoic Lens',zen:'Zen Buddhist Lens',existentialism:'Existentialist Lens',christianity:'Christian Lens'};const copy=document.getElementById('copy');const chip=document.getElementById('modeChip');const buttons=[...document.querySelectorAll('.lens-btn')];function render(lens){copy.innerHTML=content[lens].map(p=>`<p>${p}</p>`).join('');chip.textContent=labels[lens];buttons.forEach(btn=>btn.classList.toggle('active',btn.dataset.lens===lens));}buttons.forEach(btn=>btn.addEventListener('click',()=>render(btn.dataset.lens)));render('baseline');(function(){const pill=document.getElementById('navPill');const home=document.getElementById('navHome');const back=document.getElementById('navBack');if(!pill||!home||!back)return;const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));const key='balanceNavPillPos';const place=()=>{try{const raw=localStorage.getItem(key);if(!raw)return;const pos=JSON.parse(raw);const maxLeft=window.innerWidth-pill.offsetWidth-10;const maxTop=window.innerHeight-pill.offsetHeight-10;pill.style.left=clamp(pos.left ?? 24,10,maxLeft)+'px';pill.style.top=clamp(pos.top ?? 24,10,maxTop)+'px';}catch(_){}};const save=()=>{try{localStorage.setItem(key, JSON.stringify({left:pill.offsetLeft, top:pill.offsetTop}));}catch(_){}};let drag=null,moved=false;const onPointerDown=(e)=>{drag={id:e.pointerId,startX:e.clientX,startY:e.clientY,left:pill.offsetLeft,top:pill.offsetTop,target:e.target.closest('button')};moved=false;pill.classList.add('dragging');pill.setPointerCapture(e.pointerId);e.preventDefault();};const onPointerMove=(e)=>{if(!drag||e.pointerId!==drag.id)return;const dx=e.clientX-drag.startX,dy=e.clientY-drag.startY;if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;const maxLeft=window.innerWidth-pill.offsetWidth-10;const maxTop=window.innerHeight-pill.offsetHeight-10;pill.style.left=clamp(drag.left+dx,10,maxLeft)+'px';pill.style.top=clamp(drag.top+dy,10,maxTop)+'px';};const onPointerUp=(e)=>{if(!drag||e.pointerId!==drag.id)return;pill.classList.remove('dragging');try{pill.releasePointerCapture(e.pointerId);}catch(_){}const target=drag.target;const wasMoved=moved;drag=null;save();if(!wasMoved&&target){if(target===home)window.location.href='../menu.html';else if(target===back){if(window.history.length>1)window.history.back();else window.location.href='../menu.html';}}};pill.addEventListener('pointerdown',onPointerDown);pill.addEventListener('pointermove',onPointerMove);pill.addEventListener('pointerup',onPointerUp);pill.addEventListener('pointercancel',()=>{pill.classList.remove('dragging');drag=null;save();});window.addEventListener('resize',place);place();})();</script></body></html>
