<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Balance · Impact</title><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');:root{--bg:#08111c;--line:rgba(185,223,255,.18);--text:#eef6ff;--muted:#d3deec;--accent:#f0a35d;--accent2:#7ad1d8;--purple:#a78bfa;--shadow:0 26px 70px rgba(0,0,0,.42)}*{box-sizing:border-box}html,body{margin:0;min-height:100%}body{font-family:Inter,sans-serif;color:var(--text);min-height:100vh;background:radial-gradient(circle at top, rgba(122,209,216,.10), transparent 28%),linear-gradient(180deg,#07101b 0%,#0a1523 100%);display:grid;place-items:center;padding:48px;overflow:hidden}.wrap{width:min(960px,100%);border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg, rgba(11,18,30,.84), rgba(8,14,24,.74));box-shadow:var(--shadow);padding:38px 40px 40px}.eyebrow{margin:0 0 10px;color:#b8cde8;font-size:.8rem;text-transform:uppercase;letter-spacing:.18em;font-weight:600}h1{margin:0 0 14px;font-size:clamp(2.5rem,5vw,4rem)}.mode-chip{display:inline-block;margin:0 0 22px;padding:8px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:var(--accent);font-size:.8rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase}.lens-row{display:flex;gap:12px;flex-wrap:wrap;margin:0 0 26px}.lens-btn{border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:10px 14px;background:rgba(255,255,255,.04);color:#eef6ff;font:inherit;font-weight:600;cursor:pointer;transition:transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease}.lens-btn:hover{transform:translateY(-2px)}.lens-btn.active{color:#0b0f15}.lens-btn[data-lens="baseline"].active{background:rgba(255,255,255,.92);border-color:rgba(255,255,255,.92)}.lens-btn[data-lens="stoicism"].active{background:var(--accent);border-color:var(--accent)}.lens-btn[data-lens="zen"].active{background:var(--accent2);border-color:var(--accent2)}.lens-btn[data-lens="existentialism"].active{background:var(--purple);border-color:var(--purple)}p{margin:0 0 16px;color:var(--muted);line-height:1.84;font-size:1.06rem}.nav-pill{position:fixed;left:24px;top:24px;width:72px;height:148px;border-radius:999px;border:1px solid rgba(185,223,255,.28);background:linear-gradient(180deg, rgba(10,18,30,.88), rgba(7,14,24,.78));backdrop-filter:blur(10px);box-shadow:0 18px 42px rgba(0,0,0,.35);display:flex;flex-direction:column;overflow:hidden;z-index:9999;touch-action:none;user-select:none;cursor:grab}.nav-pill.dragging{cursor:grabbing}.nav-half{flex:1;border:0;background:transparent;color:#eaf5ff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font:inherit;cursor:pointer;padding:0 6px}.nav-half + .nav-half{border-top:1px solid rgba(185,223,255,.14)}.nav-half .icon{font-size:1.15rem}.nav-half .label{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-align:center;line-height:1.2}</style></head><body><main class="wrap"><p class="eyebrow">Balance Category</p><h1>Impact</h1><div class="mode-chip" id="modeChip">Baseline Definition</div><div class="lens-row"><button class="lens-btn active" data-lens="baseline">Baseline</button><button class="lens-btn" data-lens="stoicism">Stoicism</button><button class="lens-btn" data-lens="zen">Zen Buddhism</button><button class="lens-btn" data-lens="existentialism">Existentialism</button></div><div id="copy"></div></main><div class="nav-pill" id="navPill"><button class="nav-half" id="navHome" type="button"><span class="icon">⌂</span><span class="label">Menu</span></button><button class="nav-half" id="navBack" type="button"><span class="icon">←</span><span class="label">Back</span></button></div><script>const content={baseline:['The Impact domain represents the outward influence one has on the world. It is the category concerned with what your life contributes beyond your own maintenance and comfort, and with the ways your actions ripple outward into other people and systems.', 'Its subdimensions include contribution to others, kindness and compassion, mentorship, creating tools or systems that help people, and legacy. Impact therefore includes both immediate effects and the longer arc of what your life leaves behind.', 'Impact matters because contribution provides purpose and meaning beyond personal survival. It is one of the clearest ways a life becomes larger than itself.'],stoicism:['Through a Stoic lens, Impact becomes the expression of duty and usefulness. Your baseline definition already emphasizes contribution, kindness, mentorship, and legacy, and Stoicism would strongly affirm that these matter — but it would detach them from ego and public praise. The central question is not whether you are seen as impactful, but whether you are acting in accordance with virtue and benefiting the wider human community.', 'Kindness, compassion, mentorship, and system-building would be interpreted as obligations of a rational and social being. Stoics see human life as fundamentally relational and civic. So impact is not a branding exercise; it is the practical enactment of your role in the common world.', 'In this lens, Impact means doing good work well, contributing honestly, and leaving behind consequences shaped by integrity rather than vanity. Legacy matters, but more as the residue of principled action than as a project of self-immortalization.'],zen:['Through a Zen Buddhist lens, Impact becomes quieter, subtler, and less attached to self-image. Your baseline includes compassion, contribution, and helping systems, and Zen would interpret those as extensions of interdependence rather than as opportunities for self-importance. One acts because suffering is real and because presence naturally expresses care.', 'Mentorship, kindness, and creating things that help people would be understood as forms of compassionate participation. Zen would ask whether your impact arises from clarity and non-grasping, or from the need to secure an identity as someone important. The quality of action matters as much as the scale of consequence.', 'In this mode, Impact means reducing confusion, supporting life, and leaving situations more awake, more compassionate, and less burdened by egoic friction. It is impact without theatrics — influence grounded in presence.'],existentialism:['Through an Existentialist lens, Impact is the world-shape of your freedom. Your baseline definition emphasizes contribution beyond survival, and existentialism would treat that as one of the most serious questions a person can ask: what am I actually making with the life I have been given?', 'Contribution, mentorship, compassion, and legacy become expressions of chosen meaning. This lens does not assume that impact is automatically noble; it asks whether your outward influence truly reflects values you have claimed, or whether it is still being inherited from expectation, imitation, or passivity.', 'In this mode, Impact becomes the concrete evidence of authorship. It is the trace of what you have decided matters enough to shape the world around you. The question is not just whether you leave a mark, but whether the mark is genuinely yours.']};const labels={baseline:'Baseline Definition',stoicism:'Stoic Lens',zen:'Zen Buddhist Lens',existentialism:'Existentialist Lens'};const copy=document.getElementById('copy');const chip=document.getElementById('modeChip');const buttons=[...document.querySelectorAll('.lens-btn')];function render(lens){copy.innerHTML=content[lens].map(p=>`<p>${p}</p>`).join('');chip.textContent=labels[lens];buttons.forEach(btn=>btn.classList.toggle('active',btn.dataset.lens===lens));}buttons.forEach(btn=>btn.addEventListener('click',()=>render(btn.dataset.lens)));render('baseline');(function(){const pill=document.getElementById('navPill');const home=document.getElementById('navHome');const back=document.getElementById('navBack');if(!pill||!home||!back)return;const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));const key='balanceNavPillPos';const place=()=>{try{const raw=localStorage.getItem(key);if(!raw)return;const pos=JSON.parse(raw);const maxLeft=window.innerWidth-pill.offsetWidth-10;const maxTop=window.innerHeight-pill.offsetHeight-10;pill.style.left=clamp(pos.left ?? 24,10,maxLeft)+'px';pill.style.top=clamp(pos.top ?? 24,10,maxTop)+'px';}catch(_){}};const save=()=>{try{localStorage.setItem(key, JSON.stringify({left:pill.offsetLeft, top:pill.offsetTop}));}catch(_){}};let drag=null,moved=false;const onPointerDown=(e)=>{drag={id:e.pointerId,startX:e.clientX,startY:e.clientY,left:pill.offsetLeft,top:pill.offsetTop,target:e.target.closest('button')};moved=false;pill.classList.add('dragging');pill.setPointerCapture(e.pointerId);e.preventDefault();};const onPointerMove=(e)=>{if(!drag||e.pointerId!==drag.id)return;const dx=e.clientX-drag.startX,dy=e.clientY-drag.startY;if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;const maxLeft=window.innerWidth-pill.offsetWidth-10;const maxTop=window.innerHeight-pill.offsetHeight-10;pill.style.left=clamp(drag.left+dx,10,maxLeft)+'px';pill.style.top=clamp(drag.top+dy,10,maxTop)+'px';};const onPointerUp=(e)=>{if(!drag||e.pointerId!==drag.id)return;pill.classList.remove('dragging');try{pill.releasePointerCapture(e.pointerId);}catch(_){}const target=drag.target;const wasMoved=moved;drag=null;save();if(!wasMoved&&target){if(target===home)window.location.href='../menu.html';else if(target===back){if(window.history.length>1)window.history.back();else window.location.href='../menu.html';}}};pill.addEventListener('pointerdown',onPointerDown);pill.addEventListener('pointermove',onPointerMove);pill.addEventListener('pointerup',onPointerUp);pill.addEventListener('pointercancel',()=>{pill.classList.remove('dragging');drag=null;save();});window.addEventListener('resize',place);place();})();</script></body></html>
