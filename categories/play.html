<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Balance · Play</title><style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');:root{--bg:#08111c;--line:rgba(185,223,255,.18);--text:#eef6ff;--muted:#d3deec;--accent:#e1bf84;--accent2:#7ad1d8;--purple:#a78bfa;--faith:#7bc47f;--shadow:0 26px 70px rgba(0,0,0,.42)}*{box-sizing:border-box}html,body{margin:0;min-height:100%}body{font-family:Inter,sans-serif;color:var(--text);min-height:100vh;background:radial-gradient(circle at top, rgba(122,209,216,.10), transparent 28%),linear-gradient(180deg,#07101b 0%,#0a1523 100%);display:grid;place-items:center;padding:clamp(14px,2.4vh,28px);overflow-x:hidden;overflow-y:auto}.wrap{width:min(960px,100%);max-height:calc(100vh - clamp(28px,4.8vh,56px));border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg, rgba(11,18,30,.84), rgba(8,14,24,.74));box-shadow:var(--shadow);padding:clamp(20px,2.6vh,38px) clamp(20px,2.8vw,40px);display:flex;flex-direction:column;justify-content:flex-start;overflow:hidden}.eyebrow{margin:0 0 8px;color:#b8cde8;font-size:clamp(.68rem,1.15vh,.8rem);text-transform:uppercase;letter-spacing:.18em;font-weight:600}h1{margin:0 0 10px;font-size:clamp(2rem,4.6vh,3.5rem);line-height:1.05}.mode-chip{display:inline-block;align-self:flex-start;margin:0 0 16px;padding:7px 11px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.05);color:var(--accent);font-size:clamp(.68rem,1.08vh,.8rem);font-weight:600;letter-spacing:.12em;text-transform:uppercase}.lens-row{display:flex;gap:10px;flex-wrap:wrap;margin:0 0 18px}.lens-btn{border:1px solid rgba(255,255,255,.14);border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.04);color:#eef6ff;font:inherit;font-size:clamp(.84rem,1.45vh,.95rem);font-weight:600;cursor:pointer;transition:transform .18s ease, border-color .18s ease, background .18s ease, color .18s ease}.lens-btn:hover{transform:translateY(-2px)}.lens-btn.active{color:#0b0f15}.lens-btn[data-lens="baseline"].active{background:rgba(255,255,255,.92);border-color:rgba(255,255,255,.92)}.lens-btn[data-lens="stoicism"].active{background:var(--accent);border-color:var(--accent)}.lens-btn[data-lens="zen"].active{background:var(--accent2);border-color:var(--accent2)}.lens-btn[data-lens="existentialism"].active{background:var(--purple);border-color:var(--purple)}.lens-btn[data-lens="christianity"].active{background:var(--faith);border-color:var(--faith)}#copy{display:flex;flex-direction:column;gap:12px;min-height:0;flex:1;justify-content:space-evenly}p{margin:0;color:var(--muted);line-height:1.62;font-size:clamp(.92rem,1.62vh,1.01rem);text-align:justify;text-align-last:left}.nav-pill{position:fixed;left:24px;top:24px;width:72px;height:186px;border-radius:999px;border:1px solid rgba(185,223,255,.28);background:linear-gradient(180deg, rgba(10,18,30,.88), rgba(7,14,24,.78));backdrop-filter:blur(10px);box-shadow:0 18px 42px rgba(0,0,0,.35);display:flex;flex-direction:column;overflow:hidden;z-index:9999;touch-action:none;user-select:none;cursor:grab}.nav-pill.dragging{cursor:grabbing}.nav-third{flex:1;border:0;background:transparent;color:#eaf5ff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font:inherit;cursor:pointer;padding:0 6px;transition:background .22s ease,color .22s ease}.nav-third + .nav-third{border-top:1px solid rgba(185,223,255,.14)}.nav-third:hover{background:rgba(255,255,255,.05)}.nav-third .icon{font-size:1.15rem;line-height:1}.nav-third .label{font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-align:center;line-height:1.2}.visual{position:relative;margin:0 0 18px;border:1px solid rgba(255,255,255,.12);border-radius:24px;overflow:hidden;min-height:220px;background:radial-gradient(circle at 30% 32%, color-mix(in srgb, var(--accent) 38%, transparent), transparent 32%),radial-gradient(circle at 72% 60%, color-mix(in srgb, var(--accent2) 32%, transparent), transparent 34%),linear-gradient(160deg, rgba(11,18,30,.92), rgba(8,14,24,.88));box-shadow:0 18px 44px rgba(0,0,0,.24)}.visual::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 18%, rgba(255,255,255,.06), transparent 24%),linear-gradient(135deg, rgba(255,255,255,.02), transparent 44%, rgba(255,255,255,.03) 78%, transparent 100%)}.visual::after{content:"";position:absolute;inset:20px;border:1px solid rgba(255,255,255,.08);border-radius:18px}.visual-label{position:absolute;left:22px;bottom:18px;font-size:clamp(1.45rem,5vw,2.2rem);letter-spacing:.18em;text-transform:uppercase;color:rgba(238,246,255,.92);font-weight:600}.visual-mark{position:absolute;right:14px;bottom:-6px;font-size:clamp(5rem,24vw,8rem);line-height:1;color:rgba(255,255,255,.05);font-family:Georgia,serif}.visual-orb{position:absolute;left:50%;top:50%;width:44%;height:44%;transform:translate(-50%,-50%);background:radial-gradient(circle, color-mix(in srgb, var(--accent) 22%, transparent), transparent 66%);filter:blur(6px);opacity:.95}@media (max-width:720px){body{display:block;padding:12px}.wrap{width:100%;max-height:none;min-height:calc(100vh - 24px);border-radius:24px;padding:18px 16px 20px;overflow:visible}h1{font-size:clamp(1.8rem,9vw,2.6rem)}.mode-chip{margin:0 0 12px}.lens-row{gap:8px;margin:0 0 14px}.lens-btn{padding:8px 10px;font-size:.85rem}.lens-btn:hover{transform:none}#copy{gap:10px;justify-content:flex-start}.nav-pill{left:18px;top:18px}}</style></head><body><main class="wrap"><p class="eyebrow">Balance Category</p><h1>Play</h1><div class="mode-chip" id="modeChip">Baseline Definition</div><div class="visual" aria-hidden="true"><div class="visual-orb"></div><div class="visual-label" id="visualLabel"></div><div class="visual-mark" id="visualMark"></div></div><div class="lens-row"><button class="lens-btn active" data-lens="baseline">Baseline</button><button class="lens-btn" data-lens="stoicism">Stoicism</button><button class="lens-btn" data-lens="zen">Zen Buddhism</button><button class="lens-btn" data-lens="existentialism">Existentialism</button><button class="lens-btn" data-lens="christianity">Christianity</button></div><div id="copy"></div></main><div class="nav-pill" id="navPill" aria-label="Navigation control"><button class="nav-third" id="navHome" type="button" aria-label="Go to menu"><span class="icon">⌂</span><span class="label">Menu</span></button><button class="nav-third" id="navFullscreen" type="button" aria-label="Toggle fullscreen"><span class="icon">⛶</span><span class="label">Full</span></button><button class="nav-third" id="navBack" type="button" aria-label="Go back one page"><span class="icon">←</span><span class="label">Back</span></button></div><script>const visualLabel=document.getElementById('visualLabel');const visualMark=document.getElementById('visualMark');const domainThemes={Mind:{accent:'#7ad1d8',accent2:'#83aef7',mark:'M'},Body:{accent:'#f0a35d',accent2:'#d76a45',mark:'B'},Impact:{accent:'#ff8c69',accent2:'#f3c27d',mark:'I'},Connection:{accent:'#7ad1d8',accent2:'#9e8cff',mark:'C'},Spirit:{accent:'#e1bf84',accent2:'#7ad1d8',mark:'S'},Home:{accent:'#e1bf84',accent2:'#7bc47f',mark:'H'},Novelty:{accent:'#9e8cff',accent2:'#7ad1d8',mark:'N'},Play:{accent:'#f08ccb',accent2:'#e1bf84',mark:'P'},Wealth:{accent:'#7bc47f',accent2:'#e1bf84',mark:'W'}};const title=document.querySelector('h1')?.textContent?.trim();if(title&&domainThemes[title]){const t=domainThemes[title];document.documentElement.style.setProperty('--accent',t.accent);document.documentElement.style.setProperty('--accent2',t.accent2);if(visualLabel)visualLabel.textContent=title;if(visualMark)visualMark.textContent=t.mark;}const content={baseline:['The Play domain represents creative expression and activities done for enjoyment. It is the part of life that allows for joy, experimentation, imagination, and activity that is not justified only by utility.', 'Its subdimensions include art and creative work, games and storytelling, and creative experimentation. These modes of play keep emotional and imaginative life from collapsing into pure obligation.', 'Play matters because it nourishes imagination and emotional vitality. It helps life stay alive rather than merely efficient.'],stoicism:['Through a Stoic lens, Play is valid when it refreshes the soul without ruling it. Your baseline definition emphasizes joy, creativity, and non-utility, and Stoicism would not reject these. It would simply insist that delight remain proportionate and compatible with self-command.', 'Games, storytelling, creative experimentation, and art would be interpreted as forms of healthy renewal rather than as escapes from responsibility. The Stoic concern would be whether play is restoring your humanity or becoming another form of dependence and excess.', 'In this mode, Play becomes measured delight — a legitimate part of a well-ordered life, so long as it remains in service of wholeness rather than compulsion.'],zen:['Through a Zen Buddhist lens, Play is one of the clearest expressions of unforced aliveness. Your baseline definition already values joy, experimentation, and imagination, and Zen would deepen that by emphasizing spontaneity without self-conscious strain. Play is often what remains when egoic over-management loosens its grip.', 'Art, storytelling, and creative experimentation become expressions of directness and freedom. Zen would value their ability to reintroduce immediacy, delight, and non-instrumental presence into a life otherwise governed by goals and utility.', 'In this mode, Play becomes simple vividness. It is not frivolous but restorative, because it lets life breathe again.'],existentialism:['Through an Existentialist lens, Play is an affirmation that a human life cannot be reduced to productivity. Your baseline definition emphasizes enjoyment and non-utility, and existentialism would treat that as significant: to play is to resist the reduction of existence to mere function.', 'Creative work, games, and experimentation become ways of expressing freedom, style, and chosen intensity. Play reminds you that living is not only about surviving, optimizing, or fulfilling obligation. It is also about making room for expression that has value because it is lived, not because it is efficient.', 'In this mode, Play becomes a defense of vitality against deadening seriousness. It is one of the clearest signs that a life is still being inhabited rather than merely managed.'],christianity:['Through a Christian lens, Play is not frivolous by default. It can be a way of receiving joy, delight, and creaturely freedom without guilt. Your baseline already presents play as a domain of recreation, lightness, and enjoyment, and Christianity would affirm that rest and gladness can be part of a healthy life rather than signs of irresponsibility.','Fun, humor, recreation, creativity, and enjoyment would be interpreted as ways of tasting goodness and relief from strain. This lens would support play that restores, connects, and humanizes, while also asking whether forms of entertainment are aligned with love, dignity, and honest joy. Play becomes unhealthy when it turns into escape, numbness, cruelty, or avoidance of responsibility.','In this mode, Play becomes a space for delight without shame. It is where joy can be practiced, where heaviness can loosen, and where life is allowed to feel like a gift rather than only a burden. The question becomes whether your pleasures make you more alive and loving, or less present and free.']};const labels={baseline:'Baseline Definition',stoicism:'Stoic Lens',zen:'Zen Buddhist Lens',existentialism:'Existentialist Lens',christianity:'Christian Lens'};const copy=document.getElementById('copy');const chip=document.getElementById('modeChip');const buttons=[...document.querySelectorAll('.lens-btn')];function render(lens){copy.innerHTML=content[lens].map(p=>`<p>${p}</p>`).join('');chip.textContent=labels[lens];buttons.forEach(btn=>btn.classList.toggle('active',btn.dataset.lens===lens));}buttons.forEach(btn=>btn.addEventListener('click',()=>render(btn.dataset.lens)));render('baseline');(function(){const pill=document.getElementById('navPill');const home=document.getElementById('navHome');const fullscreen=document.getElementById('navFullscreen');const back=document.getElementById('navBack');if(!pill||!home||!fullscreen||!back)return;const clamp=(v,min,max)=>Math.max(min,Math.min(max,v));const key='balanceNavPillPos';const place=()=>{try{const raw=localStorage.getItem(key);if(!raw)return;const pos=JSON.parse(raw);const maxLeft=window.innerWidth-pill.offsetWidth-10;const maxTop=window.innerHeight-pill.offsetHeight-10;pill.style.left=clamp(pos.left ?? 24,10,maxLeft)+'px';pill.style.top=clamp(pos.top ?? 24,10,maxTop)+'px';}catch(_){}};const save=()=>{try{localStorage.setItem(key, JSON.stringify({left:pill.offsetLeft, top:pill.offsetTop}));}catch(_){}};let drag=null,moved=false;const onPointerDown=(e)=>{drag={id:e.pointerId,startX:e.clientX,startY:e.clientY,left:pill.offsetLeft,top:pill.offsetTop,target:e.target.closest('button')};moved=false;pill.classList.add('dragging');pill.setPointerCapture(e.pointerId);e.preventDefault();};const onPointerMove=(e)=>{if(!drag||e.pointerId!==drag.id)return;const dx=e.clientX-drag.startX,dy=e.clientY-drag.startY;if(Math.abs(dx)>3||Math.abs(dy)>3)moved=true;const maxLeft=window.innerWidth-pill.offsetWidth-10;const maxTop=window.innerHeight-pill.offsetHeight-10;pill.style.left=clamp(drag.left+dx,10,maxLeft)+'px';pill.style.top=clamp(drag.top+dy,10,maxTop)+'px';};const onPointerUp=(e)=>{if(!drag||e.pointerId!==drag.id)return;pill.classList.remove('dragging');try{pill.releasePointerCapture(e.pointerId);}catch(_){}const target=drag.target;const wasMoved=moved;drag=null;save();if(!wasMoved&&target){if(target===home)window.location.href='../menu.html';else if(target===fullscreen){const isFs=!!(document.fullscreenElement||document.webkitFullscreenElement);const node=document.documentElement;if(!isFs){if(node.requestFullscreen)node.requestFullscreen();else if(node.webkitRequestFullscreen)node.webkitRequestFullscreen();}else{if(document.exitFullscreen)document.exitFullscreen();else if(document.webkitExitFullscreen)document.webkitExitFullscreen();}}else if(target===back){if(window.history.length>1)window.history.back();else window.location.href='../menu.html';}}};pill.addEventListener('pointerdown',onPointerDown);pill.addEventListener('pointermove',onPointerMove);pill.addEventListener('pointerup',onPointerUp);pill.addEventListener('pointercancel',()=>{pill.classList.remove('dragging');drag=null;save();});window.addEventListener('resize',place);place();})();</script></body></html>
